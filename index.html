<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="100 фраз">
<meta name="theme-color" content="#0b0e13">
<title>Тренажёр · English</title>
<style>
:root{--bg:#0b0e13;--card:#161b24;--card2:#1c2330;--ink:#eef2f8;--muted:#8d9aac;--line:#252d3a;--accent:#56d4a0;--accent2:#6c9eff;--gold:#ffc15c;--pur:#c08cff;--red:#ff6b6b;--grad:linear-gradient(135deg,#56d4a0,#6c9eff)}
html[data-theme="light"]{--bg:#f3f5f9;--card:#ffffff;--card2:#eef1f7;--ink:#1b2330;--muted:#5d6a7d;--line:#e4e9f0;--accent:#13a07a;--accent2:#3b6fe0;--gold:#bd8417;--pur:#8b5cf6;--red:#e0564f}
html[data-theme="light"] header{background:rgba(243,245,249,.86)}
html[data-theme="light"] nav{background:rgba(243,245,249,.94)}
html[data-theme="light"] .fc-front{background:linear-gradient(160deg,#ffffff,#e9eff7)}
html[data-theme="light"] .fc-back{background:linear-gradient(160deg,#e7f8f0,#d3eee3)}
html[data-theme="light"] .lcard{background:linear-gradient(160deg,#ffffff,#e9eff7)}
html[data-theme="light"] .q-prompt,html[data-theme="light"] .tr-prompt{background:#fff}
html[data-theme="light"] circle[stroke="#252d3a"]{stroke:#e2e8f0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.app{max-width:560px;margin:0 auto;min-height:100%;padding-bottom:82px}
header{position:sticky;top:0;z-index:20;background:rgba(11,14,19,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
header .ttl{font-size:16px;font-weight:800}
header .ttl span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.flame{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:700;color:var(--gold);background:rgba(255,193,92,.12);border:1px solid rgba(255,193,92,.25);padding:5px 11px;border-radius:30px}
.hdr-right{display:flex;gap:9px;align-items:center}
.theme-btn{background:var(--card);border:1px solid var(--line);color:var(--ink);width:36px;height:32px;border-radius:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.screen{display:none;padding:18px;animation:fade .25s ease}.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2{font-size:22px;margin:2px 0 4px}.sub{color:var(--muted);font-size:13.5px;margin:0 0 18px}
.ring-wrap{display:flex;align-items:center;gap:20px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:14px}
.ring{position:relative;width:108px;height:108px;flex:none}.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pct b{font-size:26px;font-weight:800}.ring .pct small{font-size:11px;color:var(--muted)}
.ring-info{flex:1}.ring-info .big{font-size:15px;font-weight:700;margin-bottom:8px}
.stat-row{display:flex;gap:8px}.stat{flex:1;background:var(--card2);border-radius:12px;padding:9px 6px;text-align:center}
.stat b{font-size:18px;display:block}.stat small{font-size:10px;color:var(--muted)}
.stat.n b{color:var(--accent2)}.stat.l b{color:var(--gold)}.stat.k b{color:var(--accent)}
.cta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.cta button{border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:700;color:#06120d;background:var(--grad);cursor:pointer}
.cta button.alt{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.cta button.full{grid-column:1/-1;background:var(--card);color:var(--ink);border:1px solid var(--line)}
.section-t{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin:18px 2px 10px}
.block{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer}
.block .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px}.block .top span{color:var(--muted);font-size:12px}
.bar{height:7px;background:var(--card2);border-radius:6px;overflow:hidden}.bar i{display:block;height:100%;background:var(--grad);border-radius:6px;transition:width .4s}
.hard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 15px}
.hard .h{font-size:14px;display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}.hard .h:last-child{border:none}.hard .h .e{color:var(--accent)}
.deckbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;color:var(--muted)}
.pbar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;margin-bottom:16px}.pbar i{display:block;height:100%;background:var(--grad);transition:width .3s}
.fc{perspective:1200px;height:330px;margin-bottom:16px}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
.fc.flip .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-front{background:radial-gradient(120% 120% at 50% 0%,#1b2230,#12161e)}
.fc-back{background:radial-gradient(120% 120% at 50% 0%,#15281f,#101a16);transform:rotateY(180deg)}
.fc-face .word{font-size:29px;font-weight:800}.fc-face .word.en{color:var(--accent)}
.fc-face .ex{margin-top:14px;font-size:13.5px;color:var(--muted);max-width:90%}
.fc-face .ex b{color:var(--accent2);font-weight:600}
.tp{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:20px}
.tp.p{background:rgba(192,140,255,.16);color:var(--pur)}.tp.w{background:rgba(108,158,255,.14);color:var(--accent2)}
.fc-face .tpb{margin-top:12px}.fc-face .hint{position:absolute;bottom:14px;font-size:12px;color:var(--muted)}.fc-face .fr{position:absolute;top:14px;right:16px;font-size:11px;color:var(--muted)}
.ans2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ans2 button{border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;cursor:pointer}
.ans2 .no{background:rgba(255,107,107,.15);color:var(--red);border:1px solid rgba(255,107,107,.3)}
.ans2 .yes{background:rgba(86,212,160,.15);color:var(--accent);border:1px solid rgba(86,212,160,.3)}
.lcard{background:radial-gradient(130% 130% at 50% 0%,#1b2230,#12161e);border:1px solid var(--line);border-radius:24px;padding:30px 22px;text-align:center;margin-bottom:16px;min-height:240px;display:flex;flex-direction:column;justify-content:center}
.lcard .word{font-size:30px;font-weight:800}.lcard .en{font-size:22px;color:var(--accent);font-weight:700;margin-top:8px}
.lcard .exbox{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:14px}
.lcard .exbox .r{color:var(--ink)}.lcard .exbox .e{color:var(--accent2);margin-top:4px}
.lbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbtns button{border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;cursor:pointer}
.lbtns .know{background:rgba(86,212,160,.15);color:var(--accent);border:1px solid rgba(86,212,160,.3)}
.lbtns .next{background:var(--grad);color:#06120d}
.reveal-btn{width:100%;border:1px dashed var(--line);background:var(--card2);color:var(--muted);border-radius:14px;padding:13px;font-weight:600;cursor:pointer;margin-top:4px}
.q-prompt{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px}
.q-prompt .word{font-size:27px;font-weight:800}.q-prompt small{color:var(--muted);font-size:12px}
.q-opts{display:grid;gap:10px}
.q-opts button{text-align:left;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:15px 17px;font-size:15.5px;font-weight:600;cursor:pointer;transition:.15s}
.q-opts button.ok{background:rgba(86,212,160,.18);border-color:var(--accent);color:var(--accent)}
.q-opts button.bad{background:rgba(255,107,107,.15);border-color:var(--red);color:var(--red)}
.q-score{display:flex;justify-content:space-between;margin-bottom:14px;font-size:13px;color:var(--muted)}.q-score b{color:var(--ink)}
.tr-prompt{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:6px}
.tr-prompt .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
.tr-prompt .ru{font-size:20px;font-weight:700;margin-top:6px}
.tr-ans{min-height:58px;border-bottom:2px solid var(--line);margin:16px 0;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;padding-bottom:8px}
.tr-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tok{background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:9px 13px;font-size:15px;font-weight:600;cursor:pointer;user-select:none}
.tr-ans .tok{background:var(--card);border-color:var(--accent2)}
.tr-feedback{border-radius:14px;padding:13px 16px;margin-bottom:12px;font-size:14px;font-weight:600;display:none}
.tr-feedback.ok{display:block;background:rgba(86,212,160,.14);color:var(--accent);border:1px solid rgba(86,212,160,.3)}
.tr-feedback.bad{display:block;background:rgba(255,107,107,.13);color:#ffb3b3;border:1px solid rgba(255,107,107,.3)}
.tr-feedback small{display:block;color:var(--muted);font-weight:500;margin-top:4px}
.big-btn{width:100%;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:700;color:#06120d;background:var(--grad);cursor:pointer}
.big-btn:disabled{opacity:.4;background:var(--card2);color:var(--muted)}
.big-btn.alt{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 15px;color:var(--ink);font-size:15px;margin-bottom:12px;outline:none}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:30px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--grad);color:#06120d;border-color:transparent}
.row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 14px;margin-bottom:8px;cursor:pointer}
.row .dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--muted)}.row .dot.learning{background:var(--gold)}.row .dot.known{background:var(--accent)}
.row .txt{flex:1;min-width:0}.row .txt .r{font-weight:700;font-size:15px}.row .txt .e{color:var(--accent);font-size:13px}.row .fr{font-size:11px;color:var(--muted)}
.done-box{text-align:center;padding:40px 20px;background:var(--card);border:1px solid var(--line);border-radius:20px}
.done-box .em{font-size:46px}.done-box h3{margin:10px 0 6px}.done-box p{color:var(--muted);margin:0 0 16px}
.done-box button{border:none;border-radius:14px;padding:13px 22px;font-weight:700;background:var(--grad);color:#06120d;cursor:pointer}
nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(11,14,19,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto;padding:7px 2px calc(7px + env(safe-area-inset-bottom))}
nav button{flex:1;background:none;border:none;color:var(--muted);font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer}
nav button .ic{font-size:18px}nav button.on{color:var(--accent)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:30px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:30;pointer-events:none}.toast.show{opacity:1}
</style></head><body>
<div class="app">
  <header><div class="ttl">100 фраз <span>→ English</span></div><div class="hdr-right"><button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button><div class="flame">🔥 <span id="streak">0</span></div></div></header>

  <div class="screen on" id="s-home">
    <h2>Привет, Андрей!</h2>
    <p class="sub">Учим самые частые слова и фразы из наших разговоров.</p>
    <div class="ring-wrap">
      <div class="ring"><svg width="108" height="108"><circle cx="54" cy="54" r="46" stroke="#252d3a" stroke-width="11" fill="none"/><circle id="ring-fg" cx="54" cy="54" r="46" stroke="url(#g)" stroke-width="11" fill="none" stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="289"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#56d4a0"/><stop offset="1" stop-color="#6c9eff"/></linearGradient></defs></svg><div class="pct"><b id="ring-pct">0%</b><small>выучено</small></div></div>
      <div class="ring-info"><div class="big" id="ring-msg">Поехали 🚀</div><div class="stat-row"><div class="stat n"><b id="c-new">0</b><small>новые</small></div><div class="stat l"><b id="c-learn">0</b><small>учу</small></div><div class="stat k"><b id="c-known">0</b><small>выучено</small></div></div></div>
    </div>
    <div class="cta">
      <button onclick="startLesson()">📚 Урок</button>
      <button class="alt" onclick="startTranslate()">🧩 Перевод</button>
      <button class="alt" onclick="startCards()">📇 Карточки</button>
      <button class="alt" onclick="startQuiz()">🎯 Тест</button>
      <button class="full" onclick="go('browse')">📖 Все 100 слов</button>
    </div>
    <div class="section-t">Учить по блокам (по 20)</div>
    <div id="blocks"></div>
    <div class="section-t">Сложные слова (где ошибаешься)</div>
    <div class="hard" id="hard"></div>
  </div>

  <div class="screen" id="s-lesson">
    <div class="deckbar"><span id="le-label">Урок</span><span id="le-prog">0 / 0</span></div>
    <div class="pbar"><i id="le-bar" style="width:0"></i></div>
    <div id="lesson-area"></div>
  </div>

  <div class="screen" id="s-cards">
    <div class="deckbar"><span id="deck-label">Карточки</span><span id="deck-progress">0 / 0</span></div>
    <div class="pbar"><i id="cd-bar" style="width:0"></i></div>
    <div id="card-area"></div>
  </div>

  <div class="screen" id="s-translate">
    <div class="deckbar"><span>🧩 Собери перевод</span><span>Верно: <b id="tr-correct" style="color:var(--accent)">0</b></span></div>
    <div id="translate-area"></div>
  </div>

  <div class="screen" id="s-quiz">
    <div class="q-score"><span>Вопрос <b id="q-num">1</b></span><span>Верно: <b id="q-correct">0</b></span></div>
    <div id="quiz-area"></div>
  </div>

  <div class="screen" id="s-browse">
    <h2>Все слова</h2>
    <input class="search" id="search" placeholder="Поиск…" oninput="renderBrowse()">
    <div class="chips" id="chips"></div>
    <div id="list"></div>
  </div>

  <nav>
    <button class="on" data-s="home" onclick="go('home')"><span class="ic">🏠</span>Главная</button>
    <button data-s="lesson" onclick="startLesson()"><span class="ic">📚</span>Урок</button>
    <button data-s="cards" onclick="startCards()"><span class="ic">📇</span>Карточки</button>
    <button data-s="translate" onclick="startTranslate()"><span class="ic">🧩</span>Перевод</button>
    <button data-s="quiz" onclick="startQuiz()"><span class="ic">🎯</span>Тест</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

const LS='vocab100v2';
let state=load();function load(){try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}}}
function save(){localStorage.setItem(LS,JSON.stringify(state))}
if(!state.cards){state.cards={};const old=localStorage.getItem('vocab100v1');if(old){try{const o=JSON.parse(old);if(o.cards)state.cards=o.cards;if(o.streak)state.streak=o.streak}catch(e){}}}
DATA.forEach(d=>{if(!state.cards[d.id])state.cards[d.id]={st:'new',ok:0,seen:0,wrong:0}});
if(!state.streak)state.streak={c:0,last:''};save();
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);var b=document.getElementById('themeBtn');if(b)b.textContent=(t==='light')?'☀️':'🌙';state.theme=t;save();}
function toggleTheme(){applyTheme(state.theme==='light'?'dark':'light')}
const DIST=["today","please","maybe","really","people","time","work","good","plan","help","now","very","next","week","thing","make","know","want","need","here","this","that","with","your","every"];
function today(){return new Date().toISOString().slice(0,10)}
function touchStreak(){const ds=today();if(state.streak.last===ds)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);state.streak.c=(state.streak.last===y)?(state.streak.c+1):1;state.streak.last=ds;save()}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1400)}
function counts(){let n=0,l=0,k=0;DATA.forEach(d=>{const s=state.cards[d.id].st;if(s==='known')k++;else if(s==='learning')l++;else n++});return{n,l,k}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function go(s){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('on'));document.getElementById('s-'+s).classList.add('on');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));window.scrollTo(0,0);if(s==='home')renderHome();if(s==='browse')renderBrowse()}
function norm(s){return s.toLowerCase().replace(/[.,!?;:]/g,'').replace(/\s+/g,' ').trim()}

function renderHome(){const c=counts();const pct=Math.round(c.k/DATA.length*100);
  document.getElementById('ring-pct').textContent=pct+'%';document.getElementById('ring-fg').style.strokeDashoffset=289-(289*pct/100);
  document.getElementById('c-new').textContent=c.n;document.getElementById('c-learn').textContent=c.l;document.getElementById('c-known').textContent=c.k;
  document.getElementById('streak').textContent=state.streak.c;
  document.getElementById('ring-msg').textContent=pct===0?'Поехали 🚀':pct<30?'Хорошее начало 💪':pct<70?'Отличный темп 🔥':pct<100?'Почти всё! 🏁':'Всё выучено! 🏆';
  let bl='';for(let b=0;b<5;b++){const ids=DATA.slice(b*20,b*20+20);const kn=ids.filter(d=>state.cards[d.id].st==='known').length;const p=Math.round(kn/ids.length*100);bl+=`<div class="block" onclick="startLesson(${b})"><div class="top"><b>Блок ${b+1}</b><span>${kn}/20 · слова ${b*20+1}–${b*20+20}</span></div><div class="bar"><i style="width:${p}%"></i></div></div>`}
  document.getElementById('blocks').innerHTML=bl;
  const hard=DATA.filter(d=>state.cards[d.id].wrong>0).sort((a,b)=>state.cards[b.id].wrong-state.cards[a.id].wrong).slice(0,5);
  document.getElementById('hard').innerHTML=hard.length?hard.map(d=>`<div class="h"><span>${d.ru} — <span class="e">${d.en}</span></span><span style="color:var(--red)">✕${state.cards[d.id].wrong}</span></div>`).join(''):'<div class="h" style="color:var(--muted)">Пока пусто — начни тренироваться 👇</div>';}

/* LESSON */
let les=[],lei=0,leRevealed=false;
function startLesson(block){go('lesson');let pool=(typeof block==='number')?DATA.slice(block*20,block*20+20):DATA.filter(d=>state.cards[d.id].st==='new');if(!pool.length)pool=DATA.slice();les=pool.slice(0,12);lei=0;document.getElementById('le-label').textContent=(typeof block==='number')?('Блок '+(block+1)):'Новые слова';showLesson();}
function showLesson(){const area=document.getElementById('lesson-area');document.getElementById('le-prog').textContent=lei+' / '+les.length;document.getElementById('le-bar').style.width=(lei/les.length*100)+'%';
  if(lei>=les.length){area.innerHTML=`<div class="done-box"><div class="em">📚✨</div><h3>Урок пройден!</h3><p>${les.length} слов изучено</p><button onclick="startTranslate()">Закрепить переводом →</button></div>`;touchStreak();renderHome();return;}
  const d=les[lei];leRevealed=false;
  area.innerHTML=`<div class="lcard"><div class="word">${d.ru}</div><div class="tp ${d.tp==='фраза'?'p':'w'}" style="margin-top:10px;display:inline-block">${d.tp}</div><div id="lreveal"></div></div>
  <button class="reveal-btn" id="lrevbtn" onclick="revealLesson()">👁 Показать перевод и пример</button>`;}
function revealLesson(){const d=les[lei];leRevealed=true;document.getElementById('lreveal').innerHTML=`<div class="en">${d.en}</div><div class="exbox"><div class="r">${d.exru}</div><div class="e">${d.exen}</div></div>`;
  document.getElementById('lrevbtn').outerHTML=`<div class="lbtns"><button class="know" onclick="lessonMark(true)">Уже знаю</button><button class="next" onclick="lessonMark(false)">Дальше →</button></div>`;}
function lessonMark(known){const d=les[lei];const cs=state.cards[d.id];cs.seen++;if(known){cs.ok=2;cs.st='known'}else if(cs.st==='new'){cs.st='learning'}save();lei++;showLesson();}

/* CARDS */
let deck=[],di=0,flipped=false;
function startCards(block){go('cards');let pool=(typeof block==='number')?DATA.slice(block*20,block*20+20):DATA.slice();const order={learning:0,new:1,known:2};deck=pool.slice().sort((a,b)=>order[state.cards[a.id].st]-order[state.cards[b.id].st]||state.cards[b.id].wrong-state.cards[a.id].wrong).slice(0,20);document.getElementById('deck-label').textContent=(typeof block==='number')?('Блок '+(block+1)):'Карточки';di=0;showCard();}
function showCard(){const area=document.getElementById('card-area');document.getElementById('deck-progress').textContent=di+' / '+deck.length;document.getElementById('cd-bar').style.width=(di/deck.length*100)+'%';
  if(di>=deck.length){area.innerHTML=`<div class="done-box"><div class="em">🎉</div><h3>Сессия пройдена!</h3><p>${deck.length} карточек</p><button onclick="go('home')">На главную</button></div>`;touchStreak();renderHome();return;}
  const d=deck[di];flipped=false;
  area.innerHTML=`<div class="fc" id="fc" onclick="flipCard()"><div class="fc-inner">
    <div class="fc-face fc-front"><div class="fr">${d.fr}×</div><div class="word">${d.ru}</div><div class="tpb"><span class="tp ${d.tp==='фраза'?'p':'w'}">${d.tp}</span></div><div class="hint">нажми, чтобы перевернуть</div></div>
    <div class="fc-face fc-back"><div class="word en">${d.en}</div><div class="ex"><b>${d.exru}</b><br>${d.exen}</div><div class="hint">знаешь это слово?</div></div></div></div>
  <div class="ans2"><button class="no" onclick="markCard(false)">Не знаю</button><button class="yes" onclick="markCard(true)">Знаю ✓</button></div>`;}
function flipCard(){flipped=!flipped;document.getElementById('fc').classList.toggle('flip',flipped)}
function markCard(k){const d=deck[di];const cs=state.cards[d.id];cs.seen++;if(k){cs.ok++;cs.st=(cs.ok>=2)?'known':'learning'}else{cs.ok=0;cs.wrong++;cs.st='learning'}save();di++;showCard();}

/* TRANSLATE (Duolingo style) */
let tCard=null,tCorrect='',tBank=[],tAns=[],trCorrect=0,trChecked=false;
function startTranslate(){go('translate');trCorrect=0;nextTranslate();}
function nextTranslate(){trChecked=false;document.getElementById('tr-correct').textContent=trCorrect;
  const pool=DATA.filter(d=>state.cards[d.id].st!=='known');const src=pool.length?pool:DATA;tCard=src[Math.floor(Math.random()*src.length)];
  tCorrect=tCard.exen;const toks=tCorrect.replace(/[.,!?]/g,'').split(' ');
  let extra=[];const lc=toks.map(t=>t.toLowerCase());while(extra.length<2){const w=DIST[Math.floor(Math.random()*DIST.length)];if(!lc.includes(w)&&!extra.includes(w))extra.push(w)}
  tBank=shuffle(toks.concat(extra).map((w,i)=>({w,k:i})));tAns=[];renderTranslate();}
function renderTranslate(){const d=tCard;
  document.getElementById('translate-area').innerHTML=`<div class="tr-prompt"><div class="lbl">Переведи на английский</div><div class="ru">${d.exru}</div></div>
  <div class="tr-ans" id="tr-ans"></div>
  <div class="tr-feedback" id="tr-fb"></div>
  <div class="tr-bank" id="tr-bank"></div>
  <button class="big-btn" id="tr-check" onclick="checkTranslate()" ${tAns.length?'':'disabled'}>Проверить</button>`;
  drawTokens();}
function drawTokens(){document.getElementById('tr-ans').innerHTML=tAns.map(t=>`<span class="tok" onclick="unpick(${t.k})">${t.w}</span>`).join('');
  document.getElementById('tr-bank').innerHTML=tBank.map(t=>`<span class="tok" onclick="pick(${t.k})">${t.w}</span>`).join('');
  const btn=document.getElementById('tr-check');if(btn&&!trChecked)btn.disabled=tAns.length===0;}
function pick(k){if(trChecked)return;const i=tBank.findIndex(t=>t.k===k);if(i<0)return;tAns.push(tBank[i]);tBank.splice(i,1);drawTokens();}
function unpick(k){if(trChecked)return;const i=tAns.findIndex(t=>t.k===k);if(i<0)return;tBank.push(tAns[i]);tAns.splice(i,1);drawTokens();}
function checkTranslate(){if(trChecked)return;trChecked=true;const got=norm(tAns.map(t=>t.w).join(' '));const ok=got===norm(tCorrect);
  const cs=state.cards[tCard.id];cs.seen++;const fb=document.getElementById('tr-fb');
  if(ok){trCorrect++;cs.ok++;if(cs.st!=='known'&&cs.ok>=2)cs.st='known';else if(cs.st==='new')cs.st='learning';fb.className='tr-feedback ok';fb.innerHTML='✓ Верно! '+tCard.exen;}
  else{cs.wrong++;cs.ok=0;cs.st='learning';fb.className='tr-feedback bad';fb.innerHTML='Почти! Правильно так:<small>'+tCard.exen+'</small>';}
  document.getElementById('tr-correct').textContent=trCorrect;save();touchStreak();
  const btn=document.getElementById('tr-check');btn.disabled=false;btn.textContent='Дальше →';btn.onclick=nextTranslate;}

/* QUIZ */
let qCard=null,qNum=0,qCorrect=0,qAns=false;
function startQuiz(){go('quiz');qNum=0;qCorrect=0;nextQuiz();}
function nextQuiz(){qAns=false;qNum++;document.getElementById('q-num').textContent=qNum;document.getElementById('q-correct').textContent=qCorrect;
  const pool=DATA.filter(d=>state.cards[d.id].st!=='known');const src=pool.length?pool:DATA;qCard=src[Math.floor(Math.random()*src.length)];
  const opts=[qCard];const others=DATA.filter(d=>d.id!==qCard.id);while(opts.length<4){const o=others[Math.floor(Math.random()*others.length)];if(!opts.includes(o))opts.push(o)}shuffle(opts);
  document.getElementById('quiz-area').innerHTML=`<div class="q-prompt"><div class="word">${qCard.ru}</div><small>${qCard.tp}</small></div><div class="q-opts" id="qopts">${opts.map(o=>`<button onclick="answerQuiz(this,${o.id})">${o.en}</button>`).join('')}</div>`;}
function answerQuiz(btn,id){if(qAns)return;qAns=true;const cs=state.cards[qCard.id];cs.seen++;const ok=id===qCard.id;document.querySelectorAll('#qopts button').forEach(b=>b.disabled=true);
  if(ok){btn.classList.add('ok');qCorrect++;cs.ok++;if(cs.st!=='known'&&cs.ok>=2)cs.st='known';else if(cs.st==='new')cs.st='learning';}
  else{btn.classList.add('bad');cs.wrong++;cs.ok=0;cs.st='learning';document.querySelectorAll('#qopts button').forEach(b=>{if(b.textContent===qCard.en)b.classList.add('ok')})}
  document.getElementById('q-correct').textContent=qCorrect;save();touchStreak();setTimeout(nextQuiz,ok?700:1500);}

/* BROWSE */
let filter='all';const FILTERS=[['all','Все'],['new','Новые'],['learning','Учу'],['known','Выучено'],['фраза','Фразы'],['слово','Слова']];
function renderChips(){document.getElementById('chips').innerHTML=FILTERS.map(f=>`<div class="chip ${filter===f[0]?'on':''}" onclick="setFilter('${f[0]}')">${f[1]}</div>`).join('')}
function setFilter(f){filter=f;renderChips();renderBrowse()}
function renderBrowse(){renderChips();const q=(document.getElementById('search').value||'').toLowerCase();
  let list=DATA.filter(d=>{const s=state.cards[d.id].st;if(['new','learning','known'].includes(filter)&&s!==filter)return false;if(['фраза','слово'].includes(filter)&&d.tp!==filter)return false;if(q&&!(d.ru.toLowerCase().includes(q)||d.en.toLowerCase().includes(q)))return false;return true;});
  document.getElementById('list').innerHTML=list.map(d=>{const s=state.cards[d.id].st;return `<div class="row" onclick="cycleStatus(${d.id})"><div class="dot ${s}"></div><div class="txt"><div class="r">${d.ru}</div><div class="e">${d.en}</div></div><div class="fr">${d.fr}×</div></div>`}).join('')||'<p class="sub">Ничего не найдено</p>';}
function cycleStatus(id){const cs=state.cards[id];cs.st=cs.st==='new'?'learning':cs.st==='learning'?'known':'new';if(cs.st==='known')cs.ok=2;save();toast(cs.st==='known'?'Выучено ✓':cs.st==='learning'?'В процессе':'Сброшено');renderBrowse();}

applyTheme(state.theme||'dark');
renderHome();renderChips();
</script></body></html>
